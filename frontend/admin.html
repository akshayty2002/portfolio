<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Portal – Akshay Tyagi</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap"
    rel="stylesheet" />
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0d0f14;
      --surface: #13161d;
      --surface2: #1a1e28;
      --border: #232737;
      --accent: #5b8dee;
      --accent2: #a78bfa;
      --green: #34d399;
      --red: #f87171;
      --yellow: #fbbf24;
      --text: #e2e8f0;
      --muted: #7c8496;
      --mono: 'JetBrains Mono', monospace;
      --sans: 'Space Grotesk', sans-serif;
    }

    html,
    body {
      height: 100%;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
    }

    .login-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 2.5rem;
      width: 360px;
    }

    .login-logo {
      font-family: var(--mono);
      font-size: 0.8rem;
      color: var(--accent);
      letter-spacing: 0.1em;
      margin-bottom: 1.5rem;
    }

    .login-title {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 0.25rem;
    }

    .login-sub {
      font-size: 0.82rem;
      color: var(--muted);
      margin-bottom: 2rem;
    }

    .field {
      margin-bottom: 1rem;
    }

    .field label {
      display: block;
      font-size: 0.78rem;
      color: var(--muted);
      margin-bottom: 0.4rem;
      font-family: var(--mono);
    }

    .field input,
    .field textarea,
    .field select {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 7px;
      padding: 0.65rem 0.85rem;
      color: var(--text);
      font-family: var(--sans);
      font-size: 0.875rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .field input:focus,
    .field textarea:focus {
      border-color: var(--accent);
    }

    .field textarea {
      resize: vertical;
      min-height: 80px;
    }

    .err-msg {
      font-size: 0.78rem;
      color: var(--red);
      margin-top: 0.75rem;
      text-align: center;
    }

    .admin-layout {
      display: flex;
      min-height: 100vh;
    }

    .sidebar {
      width: 220px;
      flex-shrink: 0;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      position: fixed;
      top: 0;
      left: 0;
      bottom: 0;
      z-index: 10;
    }

    .sidebar-logo {
      padding: 1.25rem 1.5rem;
      border-bottom: 1px solid var(--border);
      font-family: var(--mono);
      font-size: 0.78rem;
      color: var(--accent);
      letter-spacing: 0.08em;
    }

    .sidebar-logo span {
      display: block;
      color: var(--muted);
      font-size: 0.68rem;
      margin-top: 0.2rem;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.7rem 1.5rem;
      cursor: pointer;
      font-size: 0.85rem;
      color: var(--muted);
      transition: all 0.15s;
      border-left: 2px solid transparent;
      user-select: none;
    }

    .nav-item:hover {
      color: var(--text);
      background: var(--surface2);
    }

    .nav-item.active {
      color: var(--accent);
      border-left-color: var(--accent);
      background: rgba(91, 141, 238, 0.06);
    }

    .nav-item svg {
      width: 15px;
      height: 15px;
      flex-shrink: 0;
    }

    .sidebar-footer {
      margin-top: auto;
      padding: 1rem 1.5rem;
      border-top: 1px solid var(--border);
    }

    .main {
      margin-left: 220px;
      flex: 1;
      padding: 2rem 2.5rem;
    }

    .page-header {
      margin-bottom: 2rem;
    }

    .page-title {
      font-size: 1.5rem;
      font-weight: 700;
    }

    .page-sub {
      font-size: 0.82rem;
      color: var(--muted);
      margin-top: 0.25rem;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.55rem 1.1rem;
      border-radius: 7px;
      font-family: var(--sans);
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all 0.15s;
      text-decoration: none;
    }

    .btn-primary {
      background: var(--accent);
      color: #fff;
    }

    .btn-primary:hover {
      background: #4a7ce0;
    }

    .btn-danger {
      background: rgba(248, 113, 113, 0.15);
      color: var(--red);
      border: 1px solid rgba(248, 113, 113, 0.3);
    }

    .btn-danger:hover {
      background: rgba(248, 113, 113, 0.25);
    }

    .btn-ghost {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
    }

    .btn-ghost:hover {
      color: var(--text);
      border-color: var(--accent);
    }

    .btn-sm {
      padding: 0.35rem 0.75rem;
      font-size: 0.75rem;
    }

    .btn-success {
      background: rgba(52, 211, 153, 0.15);
      color: var(--green);
      border: 1px solid rgba(52, 211, 153, 0.3);
    }

    .btn-success:hover {
      background: rgba(52, 211, 153, 0.25);
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
    }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 1.25rem;
      border-bottom: 1px solid var(--border);
    }

    .card-title {
      font-size: 0.9rem;
      font-weight: 600;
    }

    .table {
      width: 100%;
      border-collapse: collapse;
    }

    .table th {
      text-align: left;
      font-size: 0.72rem;
      color: var(--muted);
      font-family: var(--mono);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 0.75rem 1.25rem;
      border-bottom: 1px solid var(--border);
      background: var(--surface2);
    }

    .table td {
      padding: 0.85rem 1.25rem;
      border-bottom: 1px solid var(--border);
      font-size: 0.84rem;
      vertical-align: middle;
    }

    .table tr:last-child td {
      border-bottom: none;
    }

    .table tr:hover td {
      background: var(--surface2);
    }

    .actions {
      display: flex;
      gap: 0.5rem;
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.7);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      padding: 1rem;
    }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      width: 100%;
      max-width: 560px;
      max-height: 90vh;
      overflow-y: auto;
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.25rem 1.5rem;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: var(--surface);
      z-index: 1;
    }

    .modal-title {
      font-size: 1rem;
      font-weight: 600;
    }

    .modal-body {
      padding: 1.5rem;
    }

    .modal-footer {
      display: flex;
      justify-content: flex-end;
      gap: 0.75rem;
      padding: 1rem 1.5rem;
      border-top: 1px solid var(--border);
    }

    .close-btn {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 1.25rem;
      line-height: 1;
      padding: 0.2rem;
    }

    .close-btn:hover {
      color: var(--text);
    }

    .toast {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.75rem 1.25rem;
      font-size: 0.82rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      z-index: 200;
      animation: slideUp 0.25s ease;
    }

    .toast.success {
      border-color: var(--green);
      color: var(--green);
    }

    .toast.error {
      border-color: var(--red);
      color: var(--red);
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .badge {
      font-family: var(--mono);
      font-size: 0.65rem;
      padding: 0.15rem 0.5rem;
      border-radius: 4px;
      border: 1px solid;
    }

    .badge-green {
      color: var(--green);
      border-color: var(--green);
    }

    .badge-muted {
      color: var(--muted);
      border-color: var(--border);
    }

    .skills-admin {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .skill-row {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1rem 1.25rem;
    }

    .skill-row-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.75rem;
    }

    .skill-cat-name {
      font-weight: 600;
      font-size: 0.9rem;
    }

    .tags-wrap {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      align-items: center;
    }

    .skill-tag-admin {
      display: flex;
      align-items: center;
      gap: 0.3rem;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 5px;
      padding: 0.2rem 0.55rem;
      font-size: 0.78rem;
    }

    .tag-del {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 0.9rem;
      line-height: 1;
    }

    .tag-del:hover {
      color: var(--red);
    }

    .tag-add-input {
      background: transparent;
      border: 1px dashed var(--border);
      border-radius: 5px;
      padding: 0.2rem 0.55rem;
      color: var(--text);
      font-size: 0.78rem;
      font-family: var(--sans);
      width: 120px;
      outline: none;
    }

    .tag-add-input:focus {
      border-color: var(--accent);
    }

    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }

    @media (max-width: 600px) {
      .grid-2 {
        grid-template-columns: 1fr;
      }
    }

    .grow-wrap {
      position: relative;
      display: inline-block;
      max-width: 100%;
    }

    .grow-wrap input {
      transition: width 0.12s ease, border-color 0.2s;
    }

    .grow-measure {
      position: absolute;
      top: 0;
      left: 0;
      visibility: hidden;
      white-space: pre;
      pointer-events: none;
      font-size: 0.875rem;
      font-family: 'Space Grotesk', sans-serif;
      padding: 0.65rem 0.85rem;
    }

    .contact-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      align-items: flex-end;
      margin-bottom: 1.25rem;
    }

    .contact-chips .field {
      margin-bottom: 0;
      flex: 0 0 auto;
    }
  </style>
</head>

<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useCallback } = React;
    const API = "https://akshay-portfolio-opsl.onrender.com";

    const getToken = () => localStorage.getItem("admin_token");

    async function api(method, path, body) {
      const headers = { "Content-Type": "application/json" };
      const token = getToken();
      if (token) headers["Authorization"] = `Bearer ${token}`;
      const res = await fetch(`${API}${path}`, {
        method, headers,
        body: body ? JSON.stringify(body) : undefined
      });
      if (!res.ok) {
        const err = await res.json().catch(() => ({ detail: "Unknown error" }));
        throw new Error(err.detail || "Request failed");
      }
      return res.json();
    }


    function Toast({ msg, type, onDone }) {
      useEffect(() => { const t = setTimeout(onDone, 2800); return () => clearTimeout(t); }, []);
      return <div className={`toast ${type}`}>{msg}</div>;
    }


    function GrowInput({ value, onChange, placeholder, style, ...props }) {
      const spanRef = React.useRef(null);
      const [inputW, setInputW] = React.useState('auto');

      React.useLayoutEffect(() => {
        if (spanRef.current) {
          const w = Math.max(90, spanRef.current.scrollWidth + 2);
          setInputW(w + 'px');
        }
      }, [value, placeholder]);

      return (
        <div className="grow-wrap">
          <span ref={spanRef} className="grow-measure" aria-hidden="true">
            {value || placeholder || ''}
          </span>
          <input
            value={value}
            onChange={onChange}
            placeholder={placeholder}
            style={{ width: inputW, ...style }}
            {...props}
          />
        </div>
      );
    }

    function Login({ onLogin }) {
      const [form, setForm] = useState({ username: "", password: "" });
      const [err, setErr] = useState("");
      const [loading, setLoading] = useState(false);

      const submit = async () => {
        setLoading(true); setErr("");
        try {
          const data = await api("POST", "/api/auth/login", form);
          localStorage.setItem("admin_token", data.token);
          onLogin();
        } catch (e) { setErr(e.message); }
        setLoading(false);
      };

      return (
        <div className="login-wrap">
          <div className="login-card">
            <div className="login-logo">// admin portal</div>
            <div className="login-title">Welcome back</div>
            <div className="login-sub">Sign in to manage your portfolio</div>
            <div className="field">
              <label>Username</label>
              <input value={form.username} onChange={e => setForm({ ...form, username: e.target.value })}
                placeholder="akshay" onKeyDown={e => e.key === "Enter" && submit()} />
            </div>
            <div className="field">
              <label>Password</label>
              <input type="password" value={form.password} onChange={e => setForm({ ...form, password: e.target.value })}
                placeholder="••••••••" onKeyDown={e => e.key === "Enter" && submit()} />
            </div>
            <button className="btn btn-primary" style={{ width: "100%", justifyContent: "center", marginTop: "0.5rem" }}
              onClick={submit} disabled={loading}>
              {loading ? "Signing in…" : "Sign In"}
            </button>
            {err && <div className="err-msg">{err}</div>}
          </div>
        </div>
      );
    }

    function Modal({ title, onClose, onSave, children, saving }) {
      return (
        <div className="modal-backdrop" onClick={e => e.target === e.currentTarget && onClose()}>
          <div className="modal">
            <div className="modal-header">
              <div className="modal-title">{title}</div>
              <button className="close-btn" onClick={onClose}>×</button>
            </div>
            <div className="modal-body">{children}</div>
            <div className="modal-footer">
              <button className="btn btn-ghost" onClick={onClose}>Cancel</button>
              <button className="btn btn-primary" onClick={onSave} disabled={saving}>
                {saving ? "Saving…" : "Save"}
              </button>
            </div>
          </div>
        </div>
      );
    }

    function CertificationsPage({ toast }) {
      const [certs, setCerts] = useState([]);
      const [modal, setModal] = useState(null); // null | {mode, data}
      const [saving, setSaving] = useState(false);
      const blank = { title: "", platform: "", instructors: "", date: "", url: "" };
      const [form, setForm] = useState(blank);

      const load = () => api("GET", "/api/certifications").then(setCerts);
      useEffect(() => { load(); }, []);

      const openAdd = () => { setForm(blank); setModal({ mode: "add" }); };
      const openEdit = (c) => { setForm({ title: c.title, platform: c.platform, instructors: c.instructors, date: c.date, url: c.url }); setModal({ mode: "edit", id: c.id }); };

      const save = async () => {
        setSaving(true);
        try {
          if (modal.mode === "add") await api("POST", "/api/admin/certifications", form);
          else await api("PUT", `/api/admin/certifications/${modal.id}`, form);
          await load(); setModal(null); toast("Saved successfully", "success");
        } catch (e) { toast(e.message, "error"); }
        setSaving(false);
      };

      const del = async (id) => {
        if (!confirm("Delete this certification?")) return;
        try { await api("DELETE", `/api/admin/certifications/${id}`); await load(); toast("Deleted", "success"); }
        catch (e) { toast(e.message, "error"); }
      };

      const f = (k) => e => setForm({ ...form, [k]: e.target.value });

      return (
        <div>
          <div className="page-header" style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
            <div><div className="page-title">Certifications</div><div className="page-sub">Manage your certificates</div></div>
            <button className="btn btn-primary" onClick={openAdd}>+ Add Certificate</button>
          </div>
          <div className="card">
            <table className="table">
              <thead><tr><th>Title</th><th>Platform</th><th>Date</th><th>Actions</th></tr></thead>
              <tbody>
                {certs.map(c => (
                  <tr key={c.id}>
                    <td>{c.title}</td>
                    <td><span style={{ color: "var(--muted)" }}>{c.platform}</span></td>
                    <td><span className="badge badge-green">{c.date}</span></td>
                    <td><div className="actions">
                      <button className="btn btn-ghost btn-sm" onClick={() => openEdit(c)}>Edit</button>
                      <button className="btn btn-danger btn-sm" onClick={() => del(c.id)}>Delete</button>
                    </div></td>
                  </tr>
                ))}
                {certs.length === 0 && <tr><td colSpan="4" style={{ textAlign: "center", color: "var(--muted)", padding: "2rem" }}>No certifications yet</td></tr>}
              </tbody>
            </table>
          </div>

          {modal && (
            <Modal title={modal.mode === "add" ? "Add Certification" : "Edit Certification"} onClose={() => setModal(null)} onSave={save} saving={saving}>
              <div className="field"><label>Title</label><input value={form.title} onChange={f("title")} placeholder="Course or certification name" /></div>
              <div className="grid-2">
                <div className="field"><label>Platform</label><input value={form.platform} onChange={f("platform")} placeholder="Udemy, Coursera…" /></div>
                <div className="field"><label>Date</label><input value={form.date} onChange={f("date")} placeholder="June 2026" /></div>
              </div>
              <div className="field"><label>Instructors</label><input value={form.instructors} onChange={f("instructors")} placeholder="John Doe, Jane Smith" /></div>
              <div className="field"><label>Certificate URL</label><input value={form.url} onChange={f("url")} placeholder="https://…" /></div>
            </Modal>
          )}
        </div>
      );
    }

    function ProjectsPage({ toast }) {
      const [projects, setProjects] = useState([]);
      const [modal, setModal] = useState(null);
      const [saving, setSaving] = useState(false);
      const blank = { title: "", tech: "", github: "", description: "", highlights: "", public: true };
      const [form, setForm] = useState(blank);

      const load = () => api("GET", "/api/projects").then(setProjects);
      useEffect(() => { load(); }, []);

      const toForm = (p) => ({ title: p.title, tech: p.tech.join(", "), github: p.github, description: p.description, highlights: p.highlights.join("\n"), public: p.public });
      const toBody = (f) => ({ ...f, tech: f.tech.split(",").map(s => s.trim()).filter(Boolean), highlights: f.highlights.split("\n").map(s => s.trim()).filter(Boolean) });

      const openAdd = () => { setForm(blank); setModal({ mode: "add" }); };
      const openEdit = (p) => { setForm(toForm(p)); setModal({ mode: "edit", id: p.id }); };

      const save = async () => {
        setSaving(true);
        try {
          const body = toBody(form);
          if (modal.mode === "add") await api("POST", "/api/admin/projects", body);
          else await api("PUT", `/api/admin/projects/${modal.id}`, body);
          await load(); setModal(null); toast("Saved successfully", "success");
        } catch (e) { toast(e.message, "error"); }
        setSaving(false);
      };

      const del = async (id) => {
        if (!confirm("Delete this project?")) return;
        try { await api("DELETE", `/api/admin/projects/${id}`); await load(); toast("Deleted", "success"); }
        catch (e) { toast(e.message, "error"); }
      };

      const f = (k) => e => setForm({ ...form, [k]: e.target.value });

      return (
        <div>
          <div className="page-header" style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
            <div><div className="page-title">Projects / Repositories</div><div className="page-sub">Manage your GitHub projects</div></div>
            <button className="btn btn-primary" onClick={openAdd}>+ Add Project</button>
          </div>
          <div className="card">
            <table className="table">
              <thead><tr><th>Title</th><th>Tech</th><th>Visibility</th><th>Actions</th></tr></thead>
              <tbody>
                {projects.map(p => (
                  <tr key={p.id}>
                    <td><div style={{ fontWeight: 500 }}>{p.title}</div><div style={{ fontSize: "0.75rem", color: "var(--muted)", marginTop: "0.1rem" }}>{p.github}</div></td>
                    <td><div style={{ display: "flex", gap: "0.3rem", flexWrap: "wrap" }}>
                      {p.tech.map(t => <span key={t} style={{ fontFamily: "var(--mono)", fontSize: "0.68rem", color: "var(--accent2)", background: "rgba(167,139,250,0.08)", border: "1px solid rgba(167,139,250,0.2)", padding: "0.1rem 0.4rem", borderRadius: "4px" }}>{t}</span>)}
                    </div></td>
                    <td><span className={`badge ${p.public ? "badge-green" : "badge-muted"}`}>{p.public ? "public" : "private"}</span></td>
                    <td><div className="actions">
                      <button className="btn btn-ghost btn-sm" onClick={() => openEdit(p)}>Edit</button>
                      <button className="btn btn-danger btn-sm" onClick={() => del(p.id)}>Delete</button>
                    </div></td>
                  </tr>
                ))}
                {projects.length === 0 && <tr><td colSpan="4" style={{ textAlign: "center", color: "var(--muted)", padding: "2rem" }}>No projects yet</td></tr>}
              </tbody>
            </table>
          </div>

          {modal && (
            <Modal title={modal.mode === "add" ? "Add Project" : "Edit Project"} onClose={() => setModal(null)} onSave={save} saving={saving}>
              <div className="field"><label>Title</label><input value={form.title} onChange={f("title")} placeholder="Project name" /></div>
              <div className="field"><label>GitHub URL</label><input value={form.github} onChange={f("github")} placeholder="https://github.com/…" /></div>
              <div className="field"><label>Tech Stack <span style={{ color: "var(--muted)" }}>(comma separated)</span></label><input value={form.tech} onChange={f("tech")} placeholder="Python, FastAPI, SQLite" /></div>
              <div className="field"><label>Description</label><textarea value={form.description} onChange={f("description")} placeholder="Brief description of the project" /></div>
              <div className="field"><label>Highlights <span style={{ color: "var(--muted)" }}>(one per line)</span></label><textarea value={form.highlights} onChange={f("highlights")} style={{ minHeight: "100px" }} placeholder={"Key point 1\nKey point 2"} /></div>
              <div className="field">
                <label>Visibility</label>
                <select value={form.public ? "true" : "false"} onChange={e => setForm({ ...form, public: e.target.value === "true" })}>
                  <option value="true">Public</option>
                  <option value="false">Private</option>
                </select>
              </div>
            </Modal>
          )}
        </div>
      );
    }

    function SkillsPage({ toast }) {
      const [skills, setSkills] = useState({});
      const [newCat, setNewCat] = useState("");
      const [saving, setSaving] = useState(false);
      const [addInputs, setAddInputs] = useState({});

      const load = () => api("GET", "/api/skills").then(setSkills);
      useEffect(() => { load(); }, []);

      const saveAll = async () => {
        setSaving(true);
        try { await api("PUT", "/api/admin/skills", { skills }); toast("Skills saved", "success"); }
        catch (e) { toast(e.message, "error"); }
        setSaving(false);
      };

      const addCategory = async () => {
        if (!newCat.trim()) return;
        try { await api("POST", "/api/admin/skills/category", { name: newCat.trim() }); setNewCat(""); await load(); toast("Category added", "success"); }
        catch (e) { toast(e.message, "error"); }
      };

      const delCategory = async (name) => {
        if (!confirm(`Delete category "${name}"?`)) return;
        try { await api("DELETE", `/api/admin/skills/category/${encodeURIComponent(name)}`); await load(); toast("Deleted", "success"); }
        catch (e) { toast(e.message, "error"); }
      };

      const removeTag = (cat, tag) => {
        setSkills(prev => ({ ...prev, [cat]: prev[cat].filter(t => t !== tag) }));
      };

      const addTag = (cat) => {
        const val = (addInputs[cat] || "").trim();
        if (!val) return;
        if (skills[cat].includes(val)) { toast("Already exists", "error"); return; }
        setSkills(prev => ({ ...prev, [cat]: [...prev[cat], val] }));
        setAddInputs(prev => ({ ...prev, [cat]: "" }));
      };

      return (
        <div>
          <div className="page-header" style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
            <div><div className="page-title">Technical Skills</div><div className="page-sub">Manage skill categories and tags</div></div>
            <button className="btn btn-success" onClick={saveAll} disabled={saving}>{saving ? "Saving…" : "💾 Save All Changes"}</button>
          </div>

          <div className="skills-admin">
            {Object.entries(skills).map(([cat, tags]) => (
              <div className="skill-row" key={cat}>
                <div className="skill-row-header">
                  <div className="skill-cat-name">{cat}</div>
                  <button className="btn btn-danger btn-sm" onClick={() => delCategory(cat)}>Delete Category</button>
                </div>
                <div className="tags-wrap">
                  {tags.map(t => (
                    <span className="skill-tag-admin" key={t}>
                      {t}
                      <button className="tag-del" onClick={() => removeTag(cat, t)}>×</button>
                    </span>
                  ))}
                  <input
                    className="tag-add-input"
                    placeholder="+ add skill"
                    value={addInputs[cat] || ""}
                    onChange={e => setAddInputs(prev => ({ ...prev, [cat]: e.target.value }))}
                    onKeyDown={e => e.key === "Enter" && addTag(cat)}
                  />
                </div>
              </div>
            ))}
          </div>

          <div style={{ marginTop: "1.5rem", display: "flex", gap: "0.75rem", alignItems: "center" }}>
            <input
              style={{ background: "var(--surface)", border: "1px solid var(--border)", borderRadius: "7px", padding: "0.6rem 0.85rem", color: "var(--text)", fontFamily: "var(--sans)", fontSize: "0.875rem", outline: "none", width: "220px" }}
              placeholder="New category name"
              value={newCat}
              onChange={e => setNewCat(e.target.value)}
              onKeyDown={e => e.key === "Enter" && addCategory()}
            />
            <button className="btn btn-primary" onClick={addCategory}>+ Add Category</button>
          </div>
        </div>
      );
    }

    const ICON_OPTIONS = [
      "github", "linkedin", "twitter", "instagram", "youtube", "facebook",
      "website", "portfolio", "blog", "leetcode", "hackerrank", "kaggle",
      "stackoverflow", "discord", "telegram", "whatsapp", "email", "phone", "other"
    ];

    function ContactPage({ toast }) {
      const [fixed, setFixed] = useState({ email: "", phone: "", location: "" });
      const [links, setLinks] = useState([]);
      const [saving, setSaving] = useState(false);
      const [modal, setModal] = useState(null);
      const [form, setForm] = useState({ label: "", url: "", icon: "website", username: "" });
      const blankForm = { label: "", url: "", icon: "website", username: "" };

      const load = async () => {
        const contact = await api("GET", "/api/contact");
        setFixed(contact.fixed || {});
        setLinks(contact.links || []);
      };
      useEffect(() => { load(); }, []);

      const saveFixed = async () => {
        setSaving(true);
        try { await api("PUT", "/api/admin/contact/fixed", fixed); toast("Contact info saved", "success"); }
        catch (e) { toast(e.message, "error"); }
        setSaving(false);
      };

      const openAdd = () => { setForm(blankForm); setModal({ mode: "add" }); };
      const openEdit = (l) => { setForm({ label: l.label, url: l.url, icon: l.icon, username: l.username || "" }); setModal({ mode: "edit", id: l.id }); };

      const saveLink = async () => {
        setSaving(true);
        try {
          if (modal.mode === "add") await api("POST", "/api/admin/contact/links", form);
          else await api("PUT", `/api/admin/contact/links/${modal.id}`, form);
          await load(); setModal(null); toast("Saved", "success");
        } catch (e) { toast(e.message, "error"); }
        setSaving(false);
      };

      const delLink = async (id) => {
        if (!confirm("Delete this link?")) return;
        try { await api("DELETE", `/api/admin/contact/links/${id}`); await load(); toast("Deleted", "success"); }
        catch (e) { toast(e.message, "error"); }
      };

      const ff = (k) => e => setFixed({ ...fixed, [k]: e.target.value });
      const fl = (k) => e => setForm({ ...form, [k]: e.target.value });

      return (
        <div>
          <div className="page-header">
            <div className="page-title">Contact Info</div>
            <div className="page-sub">Manage your fixed details and social/platform links</div>
          </div>

          {/* Fixed Info */}
          <div style={{ marginBottom: "2rem" }}>
            <div className="card-title" style={{ marginBottom: "1rem", fontSize: "0.85rem", color: "var(--muted)", fontFamily: "var(--mono)", letterSpacing: "0.08em", textTransform: "uppercase" }}>Fixed Details</div>
            <div className="card" style={{ padding: "1.5rem" }}>
              <div className="contact-chips">
                <div className="field">
                  <label>Email</label>
                  <GrowInput value={fixed.email || ""} onChange={ff("email")} placeholder="you@example.com" />
                </div>
                <div className="field">
                  <label>Phone</label>
                  <GrowInput value={fixed.phone || ""} onChange={ff("phone")} placeholder="+91-..." />
                </div>
                <div className="field">
                  <label>Location</label>
                  <GrowInput value={fixed.location || ""} onChange={ff("location")} placeholder="City, Country" />
                </div>
              </div>
              <button className="btn btn-primary" onClick={saveFixed} disabled={saving}>{saving ? "Saving…" : "Save Details"}</button>
            </div>
          </div>

         
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "1rem" }}>
            <div>
              <div className="card-title" style={{ fontSize: "0.85rem", color: "var(--muted)", fontFamily: "var(--mono)", letterSpacing: "0.08em", textTransform: "uppercase" }}>Social &amp; Platform Links</div>
              <div style={{ fontSize: "0.78rem", color: "var(--muted)", marginTop: "0.25rem" }}>Add any platform — GitHub, LinkedIn, Kaggle, Portfolio, etc.</div>
            </div>
            <button className="btn btn-primary" onClick={openAdd}>+ Add Link</button>
          </div>
          <div className="card">
            <table className="table">
              <thead><tr><th>Label</th><th>Username</th><th>Icon Type</th><th>URL</th><th>Actions</th></tr></thead>
              <tbody>
                {links.map(l => (
                  <tr key={l.id}>
                    <td style={{ fontWeight: 500 }}>{l.label}</td>
                    <td><span style={{ fontFamily: "var(--mono)", fontSize: "0.78rem", color: "var(--accent2)" }}>{l.username || <span style={{ color: "var(--muted)" }}>—</span>}</span></td>
                    <td><span className="badge badge-green">{l.icon}</span></td>
                    <td><a href={l.url} target="_blank" rel="noreferrer" style={{ color: "var(--accent)", fontSize: "0.78rem", textDecoration: "none", wordBreak: "break-all" }}>{l.url || <span style={{ color: "var(--muted)" }}>—</span>}</a></td>
                    <td><div className="actions">
                      <button className="btn btn-ghost btn-sm" onClick={() => openEdit(l)}>Edit</button>
                      <button className="btn btn-danger btn-sm" onClick={() => delLink(l.id)}>Delete</button>
                    </div></td>
                  </tr>
                ))}
                {links.length === 0 && <tr><td colSpan="5" style={{ textAlign: "center", color: "var(--muted)", padding: "2rem" }}>No links yet — add GitHub, LinkedIn, Kaggle, etc.</td></tr>}
              </tbody>
            </table>
          </div>

          {modal && (
            <Modal title={modal.mode === "add" ? "Add Link" : "Edit Link"} onClose={() => setModal(null)} onSave={saveLink} saving={saving}>
              <div className="field"><label>Label <span style={{ color: "var(--muted)" }}>(shown on portfolio)</span></label>
                <input value={form.label} onChange={fl("label")} placeholder="e.g. LinkedIn, Kaggle, Portfolio…" />
              </div>
              <div className="field">
                <label>Username <span style={{ color: "var(--muted)" }}>(handle / @username)</span></label>
                <input value={form.username} onChange={fl("username")} placeholder="e.g. akshaytyagi0007" />
              </div>
              <div className="field"><label>URL</label>
                <input value={form.url} onChange={fl("url")} placeholder="https://…" />
              </div>
              <div className="field">
                <label>Icon Type <span style={{ color: "var(--muted)" }}>(used to pick icon on portfolio)</span></label>
                <select value={form.icon} onChange={fl("icon")}>
                  {ICON_OPTIONS.map(o => <option key={o} value={o}>{o}</option>)}
                </select>
              </div>
              <div style={{ marginTop: "0.5rem", padding: "0.75rem", background: "var(--surface2)", borderRadius: "7px", fontSize: "0.78rem", color: "var(--muted)" }}>
                💡 Choose the closest icon — the portfolio will show a matching icon for known platforms, or a generic link icon for others.
              </div>
            </Modal>
          )}
        </div>
      );
    }


    const icons = {
      cert: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8"><circle cx="12" cy="8" r="6" /><path d="M15.477 12.89 17 22l-5-3-5 3 1.523-9.11" /></svg>,
      project: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8"><path d="M15 22v-4a4.8 4.8 0 0 0-1-3.5c3 0 6-2 6-5.5.08-1.25-.27-2.48-1-3.5.28-1.15.28-2.35 0-3.5 0 0-1 0-3 1.5-2.64-.5-5.36-.5-8 0C6 2 5 2 5 2c-.3 1.15-.3 2.35 0 3.5A5.403 5.403 0 0 0 4 9c0 3.5 3 5.5 6 5.5-.39.49-.68 1.05-.85 1.65-.17.6-.22 1.23-.15 1.85v4" /><path d="M9 18c-4.51 2-5-2-7-2" /></svg>,
      skills: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12" /></svg>,
      contact: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.61 3.4 2 2 0 0 1 3.6 1.22h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.8a16 16 0 0 0 6 6l.86-.86a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z" /></svg>,
      logout: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" /><polyline points="16 17 21 12 16 7" /><line x1="21" y1="12" x2="9" y2="12" /></svg>,
    };

    const NAV = [
      { key: "certifications", label: "Certifications", icon: icons.cert },
      { key: "projects", label: "Projects / Repos", icon: icons.project },
      { key: "skills", label: "Technical Skills", icon: icons.skills },
      { key: "contact", label: "Contact Info", icon: icons.contact },
    ];


    function App() {
      const [authed, setAuthed] = useState(!!localStorage.getItem("admin_token"));
      const [page, setPage] = useState("certifications");
      const [toastData, setToastData] = useState(null);

      const toast = (msg, type = "success") => setToastData({ msg, type, id: Date.now() });
      const logout = () => { localStorage.removeItem("admin_token"); setAuthed(false); };

      if (!authed) return <Login onLogin={() => setAuthed(true)} />;

      const pages = { certifications: CertificationsPage, projects: ProjectsPage, skills: SkillsPage, contact: ContactPage };
      const Page = pages[page];

      return (
        <div className="admin-layout">
          <div className="sidebar">
            <div className="sidebar-logo">
          // admin portal
              <span>akshay.dev</span>
            </div>
            {NAV.map(n => (
              <div key={n.key} className={`nav-item ${page === n.key ? "active" : ""}`} onClick={() => setPage(n.key)}>
                {n.icon} {n.label}
              </div>
            ))}
            <div className="sidebar-footer">
              <div className="nav-item" onClick={logout} style={{ color: "var(--red)" }}>
                {icons.logout} Logout
              </div>
              <a href="index.html" className="nav-item" style={{ textDecoration: "none", fontSize: "0.78rem", marginTop: "0.25rem" }}>
                ← View Portfolio
              </a>
            </div>
          </div>

          <div className="main">
            <Page toast={toast} />
          </div>

          {toastData && <Toast key={toastData.id} msg={toastData.msg} type={toastData.type} onDone={() => setToastData(null)} />}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>

</html>
