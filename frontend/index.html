<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Akshay Tyagi – Portfolio</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap"
    rel="stylesheet" />
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0d0f14;
      --surface: #13161d;
      --surface2: #1a1e28;
      --border: #232737;
      --accent: #5b8dee;
      --accent2: #a78bfa;
      --green: #34d399;
      --text: #e2e8f0;
      --muted: #7c8496;
      --mono: 'JetBrains Mono', monospace;
      --sans: 'Space Grotesk', sans-serif;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      line-height: 1.6;
      overflow-x: hidden;
    }

    nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 2.5rem;
      background: rgba(13, 15, 20, 0.85);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }

    .nav-logo {
      font-family: var(--mono);
      font-size: 1rem;
      color: var(--accent);
      letter-spacing: 0.05em;
    }

    .nav-links {
      display: flex;
      gap: 2rem;
      list-style: none;
    }

    .nav-links a {
      color: var(--muted);
      text-decoration: none;
      font-size: 0.875rem;
      font-weight: 500;
      letter-spacing: 0.03em;
      transition: color 0.2s;
    }

    .nav-links a:hover {
      color: var(--text);
    }

    section {
      padding: 5rem 0;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 0 2rem;
    }

    #hero {
      min-height: 100vh;
      display: flex;
      align-items: center;
      padding-top: 5rem;
      position: relative;
      overflow: hidden;
    }

    .hero-grid {
      display: grid;
      gap: 1rem;
    }

    .hero-eyebrow {
      font-family: var(--mono);
      font-size: 0.8rem;
      color: var(--accent);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .hero-name {
      font-size: clamp(2.8rem, 6vw, 5rem);
      font-weight: 700;
      line-height: 1.05;
      letter-spacing: -0.02em;
    }

    .hero-name span {
      color: var(--accent);
    }

    .hero-title {
      font-family: var(--mono);
      font-size: 1rem;
      color: var(--accent2);
      margin-top: 0.25rem;
    }

    .hero-bio {
      max-width: 560px;
      color: var(--muted);
      font-size: 1rem;
      margin-top: 0.5rem;
      line-height: 1.75;
    }

    .hero-cta {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      margin-top: 1rem;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.65rem 1.4rem;
      border-radius: 6px;
      font-family: var(--sans);
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.2s;
      border: none;
    }

    .btn-primary {
      background: var(--accent);
      color: #fff;
    }

    .btn-primary:hover {
      background: #4a7ce0;
      transform: translateY(-1px);
    }

    .btn-outline {
      background: transparent;
      color: var(--text);
      border: 1px solid var(--border);
    }

    .btn-outline:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .hero-meta {
      display: flex;
      gap: 1.5rem;
      flex-wrap: wrap;
      margin-top: 1rem;
    }

    .hero-meta-item {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.82rem;
      color: var(--muted);
    }

    .hero-meta-item svg {
      width: 14px;
      height: 14px;
    }

    .bg-grid {
      position: absolute;
      inset: 0;
      z-index: -1;
      background-image:
        linear-gradient(rgba(91, 141, 238, 0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(91, 141, 238, 0.04) 1px, transparent 1px);
      background-size: 60px 60px;
    }

    .bg-glow {
      position: absolute;
      top: 20%;
      right: -10%;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(91, 141, 238, 0.08) 0%, transparent 70%);
      z-index: -1;
    }

    .section-label {
      font-family: var(--mono);
      font-size: 0.75rem;
      color: var(--accent);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 0.5rem;
    }

    .section-title {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 2.5rem;
    }

    .divider {
      width: 40px;
      height: 3px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 2px;
      margin: 0.75rem 0 2.5rem;
    }

    .skills-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 1.25rem;
    }

    .skill-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1.25rem;
      transition: border-color 0.2s, transform 0.2s;
    }

    .skill-card:hover {
      border-color: var(--accent);
      transform: translateY(-2px);
    }

    .skill-card-title {
      font-family: var(--mono);
      font-size: 0.7rem;
      color: var(--accent);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 0.75rem;
    }

    .skill-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
    }

    .skill-tag {
      background: var(--surface2);
      color: var(--muted);
      font-size: 0.75rem;
      padding: 0.2rem 0.55rem;
      border-radius: 4px;
      border: 1px solid var(--border);
    }

    .projects-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
      gap: 1.25rem;
    }

    .project-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      transition: border-color 0.2s, transform 0.2s;
    }

    .project-card:hover {
      border-color: var(--accent);
      transform: translateY(-3px);
    }

    .project-card-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 0.75rem;
    }

    .project-title {
      font-size: 1rem;
      font-weight: 600;
    }

    .project-badge {
      font-family: var(--mono);
      font-size: 0.65rem;
      padding: 0.15rem 0.5rem;
      border-radius: 4px;
      border: 1px solid;
    }

    .badge-public {
      color: var(--green);
      border-color: var(--green);
    }

    .badge-private {
      color: var(--muted);
      border-color: var(--border);
    }

    .project-desc {
      font-size: 0.85rem;
      color: var(--muted);
      line-height: 1.65;
      flex: 1;
      margin-bottom: 1rem;
    }

    .project-highlights {
      margin-bottom: 1rem;
    }

    .project-highlight {
      font-size: 0.78rem;
      color: var(--muted);
      padding: 0.2rem 0;
      padding-left: 0.9rem;
      position: relative;
    }

    .project-highlight::before {
      content: '▸';
      position: absolute;
      left: 0;
      color: var(--accent2);
      font-size: 0.65rem;
      top: 0.3rem;
    }

    .project-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: auto;
    }

    .project-techs {
      display: flex;
      flex-wrap: wrap;
      gap: 0.35rem;
    }

    .tech-tag {
      font-family: var(--mono);
      font-size: 0.68rem;
      color: var(--accent2);
      background: rgba(167, 139, 250, 0.08);
      border: 1px solid rgba(167, 139, 250, 0.2);
      padding: 0.15rem 0.45rem;
      border-radius: 4px;
    }

    .project-link {
      color: var(--muted);
      text-decoration: none;
      font-size: 0.78rem;
      display: flex;
      align-items: center;
      gap: 0.3rem;
      transition: color 0.2s;
      white-space: nowrap;
    }

    .project-link:hover {
      color: var(--accent);
    }

    .edu-list {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .edu-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1.25rem 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.5rem;
      transition: border-color 0.2s;
    }

    .edu-card:hover {
      border-color: var(--accent);
    }

    .edu-degree {
      font-size: 0.95rem;
      font-weight: 600;
    }

    .edu-inst {
      font-size: 0.82rem;
      color: var(--muted);
      margin-top: 0.2rem;
    }

    .edu-right {
      text-align: right;
    }

    .edu-year {
      font-family: var(--mono);
      font-size: 0.8rem;
      color: var(--accent);
    }

    .edu-pct {
      font-family: var(--mono);
      font-size: 0.78rem;
      color: var(--green);
      margin-top: 0.2rem;
    }

    .cert-list {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .cert-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1.25rem 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.75rem;
      transition: border-color 0.2s;
    }

    .cert-card:hover {
      border-color: var(--accent2);
    }

    .cert-title {
      font-size: 0.95rem;
      font-weight: 600;
      margin-bottom: 0.2rem;
    }

    .cert-meta {
      font-size: 0.8rem;
      color: var(--muted);
    }

    .cert-date {
      font-family: var(--mono);
      font-size: 0.78rem;
      color: var(--accent2);
      white-space: nowrap;
    }

    #contact {
      background: var(--surface);
      border-top: 1px solid var(--border);
    }

    .contact-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 1rem;
      margin-top: 2rem;
    }

    .contact-card {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1.25rem;
      text-decoration: none;
      color: var(--text);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      transition: border-color 0.2s, transform 0.2s;
      min-width: 0;
      min-height: 115px;
    }

    .contact-card:hover {
      border-color: var(--accent);
      transform: translateY(-2px);
    }

    .contact-icon {
      width: 36px;
      height: 36px;
      background: var(--surface2);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .contact-label {
      font-size: 0.7rem;
      color: var(--muted);
      margin-bottom: 0.15rem;
    }

    .contact-value {
      font-size: 0.85rem;
      font-weight: 500;
      word-break: break-all;
    }

    .contact-card-action {
      display: flex;
      justify-content: flex-end;
      width: 100%;
      margin-top: auto;
      padding-top: 0.5rem;
    }

    .contact-card-action a {
      color: var(--muted);
      display: inline-flex;
      align-items: center;
      transition: color 0.2s;
    }

    .contact-card-action a:hover {
      color: var(--accent);
    }

    footer {
      text-align: center;
      padding: 2rem;
      border-top: 1px solid var(--border);
      font-size: 0.78rem;
      color: var(--muted);
      font-family: var(--mono);
    }

    .loader {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 1rem;
    }

    .loader-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent);
      animation: pulse 1.2s ease-in-out infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 0.2;
        transform: scale(0.8);
      }

      50% {
        opacity: 1;
        transform: scale(1.2);
      }
    }

    @media (max-width: 640px) {
      nav {
        padding: 1rem 1.25rem;
      }

      .nav-links {
        gap: 1.25rem;
      }

      .container {
        padding: 0 1.25rem;
      }

      section {
        padding: 3.5rem 0;
      }
    }
  </style>
</head>

<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const API_BASE = "http://localhost:8000";

    const GithubIcon = () => (
      <svg viewBox="0 0 24 24" fill="currentColor" width="16" height="16">
        <path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z" />
      </svg>
    );
    const ExternalIcon = () => (
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" width="13" height="13">
        <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6" />
        <polyline points="15 3 21 3 21 9" />
        <line x1="10" y1="14" x2="21" y2="3" />
      </svg>
    );
    const MailIcon = () => (
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" width="18" height="18">
        <rect x="2" y="4" width="20" height="16" rx="2" />
        <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7" />
      </svg>
    );
    const PhoneIcon = () => (
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" width="18" height="18">
        <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.61 3.4 2 2 0 0 1 3.6 1.22h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.8a16 16 0 0 0 6 6l.86-.86a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z" />
      </svg>
    );
    const LocationIcon = () => (
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" width="14" height="14">
        <path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0z" />
        <circle cx="12" cy="10" r="3" />
      </svg>
    );
    const CertIcon = () => (
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" width="18" height="18">
        <circle cx="12" cy="8" r="6" />
        <path d="M15.477 12.89 17 22l-5-3-5 3 1.523-9.11" />
      </svg>
    );
    const LinkedInIcon = () => (
      <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18">
        <path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z" />
        <rect x="2" y="9" width="4" height="12" />
        <circle cx="4" cy="4" r="2" />
      </svg>
    );
    const TwitterIcon = () => (
      <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18">
        <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z" />
      </svg>
    );

    function Nav() {
      return (
        <nav>
          <div className="nav-logo">akshay.dev</div>
          <ul className="nav-links">
            {["Skills", "Projects", "Education", "Certifications", "Contact"].map(s => (
              <li key={s}><a href={`#${s.toLowerCase()}`}>{s}</a></li>
            ))}
          </ul>
        </nav>
      );
    }

    function Hero({ profile }) {
      if (!profile) return null;
      return (
        <section id="hero">
          <div className="bg-grid" />
          <div className="bg-glow" />
          <div className="container">
            <div className="hero-grid">
              <div className="hero-eyebrow">// hello, world</div>
              <h1 className="hero-name">
                I'm <span>{profile.name.split(' ')[0]}</span><br />{profile.name.split(' ')[1]}
              </h1>
              <div className="hero-title">{'>'} {profile.title} @ Accenture</div>
              <p className="hero-bio">{profile.objective}</p>
              <div className="hero-meta">
                <span className="hero-meta-item"><LocationIcon />{profile.location}</span>
                <span className="hero-meta-item">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" width="14" height="14">
                    <rect x="2" y="2" width="20" height="20" rx="5" />
                    <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z" />
                    <line x1="17.5" y1="6.5" x2="17.51" y2="6.5" />
                  </svg>
                  1.5+ yrs experience
                </span>
              </div>
              <div className="hero-cta">
                <a className="btn btn-primary" href={profile.github} target="_blank" rel="noreferrer">
                  <GithubIcon /> GitHub Profile
                </a>
                <a className="btn btn-outline" href={`mailto:${profile.email}`}>
                  <MailIcon style={{ width: 14, height: 14 }} /> Contact Me
                </a>
              </div>
            </div>
          </div>
        </section>
      );
    }

    function Skills({ skills }) {
      if (!skills) return null;
      return (
        <section id="skills">
          <div className="container">
            <div className="section-label">// what I work with</div>
            <h2 className="section-title">Technical Skills</h2>
            <div className="divider" />
            <div className="skills-grid">
              {Object.entries(skills).map(([cat, items]) => (
                <div className="skill-card" key={cat}>
                  <div className="skill-card-title">{cat}</div>
                  <div className="skill-tags">
                    {items.map(i => <span className="skill-tag" key={i}>{i}</span>)}
                  </div>
                </div>
              ))}
            </div>
          </div>
        </section>
      );
    }

    function Projects({ projects }) {
      if (!projects) return null;
      return (
        <section id="projects">
          <div className="container">
            <div className="section-label">// things I've built</div>
            <h2 className="section-title">Projects</h2>
            <div className="divider" />
            <div className="projects-grid">
              {projects.map(p => (
                <div className="project-card" key={p.title}>
                  <div className="project-card-top">
                    <div className="project-title">{p.title}</div>
                    <span className={`project-badge ${p.public ? 'badge-public' : 'badge-private'}`}>
                      {p.public ? 'public' : 'private'}
                    </span>
                  </div>
                  <p className="project-desc">{p.description}</p>
                  <div className="project-highlights">
                    {p.highlights.map((h, i) => (
                      <div className="project-highlight" key={i}>{h}</div>
                    ))}
                  </div>
                  <div className="project-footer">
                    <div className="project-techs">
                      {p.tech.map(t => <span className="tech-tag" key={t}>{t}</span>)}
                    </div>
                    <a className="project-link" href={p.github} target="_blank" rel="noreferrer">
                      <GithubIcon /> <ExternalIcon />
                    </a>
                  </div>
                </div>
              ))}
            </div>
          </div>
        </section>
      );
    }

    function Education({ education }) {
      if (!education) return null;
      return (
        <section id="education">
          <div className="container">
            <div className="section-label">// academic background</div>
            <h2 className="section-title">Education</h2>
            <div className="divider" />
            <div className="edu-list">
              {education.map(e => (
                <div className="edu-card" key={e.degree}>
                  <div>
                    <div className="edu-degree">{e.degree}</div>
                    <div className="edu-inst">{e.institution}</div>
                  </div>
                  <div className="edu-right">
                    <div className="edu-year">{e.year}</div>
                    <div className="edu-pct">{e.percentage}</div>
                  </div>
                </div>
              ))}
            </div>
          </div>
        </section>
      );
    }

    function Certifications({ certifications }) {
      if (!certifications) return null;
      return (
        <section id="certifications">
          <div className="container">
            <div className="section-label">// credentials</div>
            <h2 className="section-title">Certifications</h2>
            <div className="divider" />
            <div className="cert-list">
              {certifications.map(c => (
                <div className="cert-card" key={c.title}>
                  <div>
                    <div className="cert-title">{c.title}</div>
                    <div className="cert-meta">{c.platform} · {c.instructors}</div>
                  </div>
                  <div style={{ display: 'flex', alignItems: 'center', gap: '1rem', flexShrink: 0 }}>
                    <div className="cert-date">{c.date}</div>
                    <a className="btn btn-outline" href={c.url} target="_blank" rel="noreferrer"
                      style={{ padding: '0.4rem 0.9rem', fontSize: '0.78rem' }}>
                      View <ExternalIcon />
                    </a>
                  </div>
                </div>
              ))}
            </div>
          </div>
        </section>
      );
    }

    function ContactIcon({ type }) {
      const t = (type || "").toLowerCase();
      const s = { width: 18, height: 18 };
      if (t === "github") return <GithubIcon style={s} />;
      if (t === "linkedin") return <LinkedInIcon />;
      if (t === "twitter" || t === "x") return <TwitterIcon />;
      if (t === "email") return <MailIcon />;
      if (t === "phone") return <PhoneIcon />;
      // generic link icon for everything else
      return (
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" {...s}>
          <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71" />
          <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71" />
        </svg>
      );
    }

    function Contact({ profile, contact }) {
      if (!profile) return null;
      const c = contact || {};
      const fixed = c.fixed || {};
      const links = c.links || [];

      const formatDisplayValue = (label, value) => {
        if (!value) return "";
        if (value.startsWith("http://") || value.startsWith("https://")) {
          let parts = value.replace(/^https?:\/\/(www\.)?/, "").split('/');
          return parts[1] ? parts[1] : parts[0]; // Returns username path if it exists
        }
        return value;
      };

      const fixedCards = [
        { label: "Email", value: fixed.email || profile.email, href: `mailto:${fixed.email || profile.email}`, icon: <MailIcon />, external: false },
        { label: "Phone", value: fixed.phone || profile.phone, href: `tel:${fixed.phone || profile.phone}`, icon: <PhoneIcon />, external: false },
        { label: "Location", value: fixed.location || profile.location, href: null, icon: <LocationIcon style={{ width: 18, height: 18 }} />, external: false },
      ].filter(item => item.value);

      const linkCards = links.filter(l => l.url || l.username).map(l => ({
        label: l.label,
        value: l.username || formatDisplayValue(l.label, l.url),
        href: l.url || null,
        icon: <ContactIcon type={l.icon} />,
        external: true
      }));

      const allCards = [...fixedCards, ...linkCards];

      return (
        <section id="contact">
          <div className="container">
            <div className="section-label">// get in touch</div>
            <h2 className="section-title">Contact</h2>
            <div className="divider" />
            <div className="contact-grid">
              {allCards.map(item => {
                return (
                  <div key={item.label} className="contact-card action-card">
                    <div style={{ display: 'flex', alignItems: 'flex-start', gap: '0.75rem', width: '100%' }}>
                      <div className="contact-icon" style={{ flexShrink: 0, marginTop: "2px" }}>{item.icon}</div>
                      <div style={{ minWidth: 0 }}>
                        <div className="contact-label">{item.label}</div>
                        <div className="contact-value" style={{ textOverflow: 'ellipsis', overflow: 'hidden', whiteSpace: 'nowrap' }}>{item.value}</div>
                      </div>
                    </div>

                    {item.href && (
                      <div className="contact-card-action">
                        <a
                          href={item.href}
                          target={item.external ? "_blank" : "_self"}
                          rel="noreferrer"
                        >
                          <ExternalIcon />
                        </a>
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          </div>
        </section>
      );
    }

    function App() {
      const [data, setData] = useState(null);
      const [error, setError] = useState(false);

      useEffect(() => {
        fetch(`${API_BASE}/api/all`)
          .then(r => r.json())
          .then(setData)
          .catch(() => setError(true));
      }, []);

      if (error) return (
        <div className="loader">
          <div style={{ fontFamily: 'var(--mono)', color: 'var(--muted)', fontSize: '0.85rem' }}>
            Backend not running. Start with: <span style={{ color: 'var(--accent)' }}>uvicorn main:app --reload</span>
          </div>
        </div>
      );

      if (!data) return (
        <div className="loader">
          <div style={{ display: 'flex', gap: '6px' }}>
            {[0, 1, 2].map(i => (
              <div key={i} className="loader-dot" style={{ animationDelay: `${i * 0.2}s` }} />
            ))}
          </div>
          <div style={{ fontFamily: 'var(--mono)', color: 'var(--muted)', fontSize: '0.78rem' }}>
            loading portfolio...
          </div>
        </div>
      );

      return (
        <>
          <Nav />
          <Hero profile={data} />
          <Skills skills={data.skills} />
          <Projects projects={data.projects} />
          <Education education={data.education} />
          <Certifications certifications={data.certifications} />
          <Contact profile={data} contact={data.contact} />
          <footer>
            built with React + FastAPI · © 2026 {data.name}
          </footer>
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>

</html>
